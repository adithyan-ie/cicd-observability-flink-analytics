<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Incident Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: opacity 0.3s ease;
            opacity: 0.9;
        }

        nav a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-height: 70vh;
        }

        .container-header {
            padding: 2rem 2rem 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .container-header h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .container-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .content {
            padding: 2rem;
        }

        h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1.5rem;
            margin-top: 2rem;
        }

        h2:first-child {
            margin-top: 0;
        }

        h3 {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 1rem;
        }

        /* Forms */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-width: 500px;
        }

        input, textarea, select {
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            align-self: flex-start;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background: #f8f9fa;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #dee2e6;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h4 {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
        }

        /* Action Links */
        .action-links {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .action-links a {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .action-links a:hover {
            background: #764ba2;
        }

        .action-links a.secondary {
            background: #6c757d;
        }

        .action-links a.secondary:hover {
            background: #5a6268;
        }

        .action-links a.danger {
            background: #dc3545;
        }

        .action-links a.danger:hover {
            background: #c82333;
        }

        /* List Items */
        .incident-list {
            list-style: none;
        }

        .incident-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            margin-bottom: 0.8rem;
            transition: background 0.2s ease;
        }

        .incident-item:hover {
            background: #f8f9fa;
        }

        .incident-info {
            flex: 1;
        }

        .incident-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .incident-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge.critical {
            background: #f8d7da;
            color: #721c24;
        }

        .badge.high {
            background: #fff3cd;
            color: #856404;
        }

        .badge.medium {
            background: #cce5ff;
            color: #004085;
        }

        .badge.low {
            background: #d4edda;
            color: #155724;
        }

        .badge.open {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge.closed {
            background: #d4edda;
            color: #155724;
        }

        .badge.elite {
            background: #d4edda;
            color: #155724;
        }

        .badge.high-band {
            background: #cce5ff;
            color: #004085;
        }

        .badge.medium-band {
            background: #fff3cd;
            color: #856404;
        }

        .badge.low-band {
            background: #f8d7da;
            color: #721c24;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav .nav-links {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .container {
                margin: 1rem auto;
                border-radius: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            form {
                max-width: 100%;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar">
            <a href="/" class="brand">🎯 Smart Incident Platform</a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/incidents">Incidents</a></li>
                <li><a href="/dora">DORA Metrics</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
