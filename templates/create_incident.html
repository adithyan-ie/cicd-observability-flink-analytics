{% extends 'base.html' %}
{% block content %}
<div class="container-header">
    <h1>Create Incident</h1>
    <p>Report a new incident</p>
</div>
<div class="content">
    <form method="post">
        <label for="title" style="font-weight: 600; color: #333;">Incident Title *</label>
        <input type="text" id="title" name="title" placeholder="Brief description of the incident" required>
        
        <label for="description" style="font-weight: 600; color: #333; margin-top: 0.5rem;">Description</label>
        <textarea id="description" name="description" placeholder="Detailed information about the incident..."></textarea>
        
        <label for="severity" style="font-weight: 600; color: #333; margin-top: 0.5rem;">Severity Level *</label>
        <select id="severity" name="severity" required>
            <option value="">-- Select Severity --</option>
            <option value="Critical">🔴 Critical</option>
            <option value="High">🟠 High</option>
            <option value="Medium">🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>
        
        <button type="submit">Create Incident</button>
    </form>
</div>
{% endblock %}
